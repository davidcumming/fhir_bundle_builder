role_id: assembly_manager
name: Assembly Manager Agent
profile_markdown: docs/agents/assembly-manager-agent-profile.md

model:
  provider: openai
  model_name: gpt-5.4
  temperature: 0.2

memory:
  type: openviking
  namespace: agents/assembly_manager/memory

context:
  roots:
    - agents/assembly_manager/profile
    - bundles/psca/manifest
    - bundles/psca/build-rules

tools:
  allowed:
    - manifest_lookup
    - artifact_reader
    - artifact_writer
    - accepted_resource_registry

output:
  primary_artifact: BuildPlan

behavior:
  narrate_progress: false
  expose_delegation_trace: true